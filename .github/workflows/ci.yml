name: CI - Gestão Pet API

on:
  push:
    branches: [ main, springboot-migration ]
  pull_request:
    branches: [ main, springboot-migration ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit and integration tests
        run: mvn clean verify
