name: CI - Paws Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Testes
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes automatizados
        run: mvn verify

      - name: publicar relatorio JaCoCo
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/



  # Job 2: Build Docker + Push GHCR

  docker-build-and-push:
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'   # o build docker só acontece se o push for na branch main
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read # permite a leitura do código do repositório
      packages: write # permite publicar imagem no ghcr

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up QEMU / Configurar QEMU  # QEMU é um emulador que permite ao linux(amd64) simular outras arquiteturas(arm64 para esse projeto)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx / Configurar Docker Buildx # Buildx builda para multiplatafomas
        uses: docker/setup-buildx-action@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadata (tags e label) # para controle de versoes dos containers
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build e Push da imagem
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          #build multiplataforma para amd e arm
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          #Cache reutiliza camadas da imagem anterior para construir a imagem atual com mais velocidade
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 3: Deploy automatico na Oracle Cloud
  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: | 
            cd ~/paws-manager
            docker compose pull backend
            docker compose up -d
            docker image prune -f     # limpa as imagens docker antigas para não ocupar espaço