name: CI - Paws Manager

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Testes
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes automatizados
        run: mvn verify

      - name: publicar relatorio JaCoCo
        uses: actions/upload-artifact@v4.6.2
        with:
          name: jacoco-report
          path: target/site/jacoco/

  # Job 2: Build Docker + Push GHCR


  build-and-push:
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # o build docker só acontece se o push for na branch main
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read # permite a leitura do código do repositório
      packages: write # permite publicar imagem no ghcr

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadata (tags e label)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build e Push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}