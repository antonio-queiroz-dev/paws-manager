name: CI - Gestão Pet API

on:
  push:
    branches: [ main, springboot-migration ]
  pull_request:
    branches: [ main, springboot-migration ]

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Executar testes automatizados
        run: mvn verify

      - name: publicar relatorio JaCoCo
        uses: actions/upload-artifact@v4.6.2
        with:
          name: jacoco-report
          path: target/site/jacoco/