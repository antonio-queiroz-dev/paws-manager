version: '3.8'
name: sistemacadastropet

services:
  mysql:
    image: mysql:8.0
    container_name: pawsmanager.api_mysql
    environment:
      MYSQL_DATABASE: pawsmanager.api_mysql
      MYSQL_ROOT_PASSWORD: manager
      MYSQL_USER: usuario
      MYSQL_PASSWORD: senha123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      interval: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: pawsmanager.api_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      interval: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pawsmanager.api_backend
    ports:
      - "8080:8080"
    environment:
      # Banco de dados
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pawsmanager.api_mysql
      SPRING_DATASOURCE_USERNAME: usuario
      SPRING_DATASOURCE_PASSWORD: senha123

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      # JPA/Hibernate
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"

      # Profile
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  mysql_data:
  redis_data: